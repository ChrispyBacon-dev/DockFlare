# nginx.conf (example template)
server {
    listen 80;
    server_name localhost; # Or your actual domain in production

    # Route for Next.js frontend
    location / {
        proxy_pass http://dockflare-nextui:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Route for Flask API backend
    location /api/v2/ {
        proxy_pass http://dockflare-backend:5000/api/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route for SSE Log Stream
    location /stream-logs {
        proxy_pass http://dockflare-backend:5000/stream-logs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Crucial for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s; # Long timeout
        proxy_send_timeout 3600s;
        proxy_set_header Connection ''; 
        proxy_http_version 1.1;
        # Add X-Accel-Buffering 'no'; if your backend sends it and you want to be explicit
        # proxy_set_header X-Accel-Buffering no; 
    }

    # Optional: You might need specific locations for Next.js static assets if not using standalone
    # location /_next/static/ {
    #    proxy_pass http://dockflare-nextui:3000/_next/static/;
    # }
}